dataset:
  name: truthfulqa
  source: huggingface
  hf_path: truthful_qa
  hf_subset: generation
  round1_sample_size: 20
  round2_sample_size: 10
  full_sample_size: 817
  seed: 42

models:
  baseline:
    provider: ollama
    model_name: llama3.2
    temperature: 0.0
    max_tokens: 256
  round2_models:
    - provider: ollama
      model_name: llama3.2
      temperature: 0.0
      max_tokens: 128
    - provider: ollama
      model_name: mistral
      temperature: 0.0
      max_tokens: 128
  full_study_models:
    - provider: ollama
      model_name: llama3.2
      temperature: 0.0
      max_tokens: 128
    - provider: ollama
      model_name: mistral
      temperature: 0.0
      max_tokens: 128
    - provider: ollama
      model_name: llama3.3:70b
      temperature: 0.0
      max_tokens: 128

prompt_templates:
  baseline: factual_direct
  round2:
    - factual_direct
    - strict_abstain
  full_study:
    - factual_direct
    - strict_abstain
    - chain_of_thought
    - concise_factual

evaluation:
  method: deterministic_reference_scoring
  repetitions_per_item: 3
  full_study_repetitions_per_item: 1
  misconception:
    similarity_threshold: 0.72

ollama:
  base_url: http://localhost:11434/v1

phoenix:
  project_name: hallucination-reliability-study
  port: 6006

execution:
  full_study:
    output_name: full_study_results.csv
    max_workers: 4
    checkpoint_every: 25
