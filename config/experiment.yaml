dataset:
  name: truthfulqa
  source: huggingface
  hf_path: truthful_qa
  hf_subset: generation
  # Legacy keys (used by run_round1_baseline.py and run_round2_matrix.py)
  round1_sample_size: 20
  round2_sample_size: 10
  # Full study — all 817 questions required for publishability (Namin, 2026)
  sample_size: 817
  seed: 42

models:
  # Legacy baseline (run_round1_baseline.py)
  baseline:
    provider: ollama
    model_name: llama3.2
    temperature: 0.0
    max_tokens: 256

  # Legacy round 2 (run_round2_matrix.py)
  round2_models:
    - provider: ollama
      model_name: llama3.2
      temperature: 0.0
      max_tokens: 128
    - provider: ollama
      model_name: mistral
      temperature: 0.0
      max_tokens: 128

  # Full study — small / medium / large (run_experiment.py)
  experiment_models:
    - provider: ollama
      model_name: phi3:mini
      size_class: small
      temperature: 0.0
      max_tokens: 256
    - provider: ollama
      model_name: mistral:7b
      size_class: medium
      temperature: 0.0
      max_tokens: 256
    - provider: ollama
      model_name: llama3:8b
      size_class: large
      temperature: 0.0
      max_tokens: 256

  # Optional appendix-only setting retained for non-paper experiments.
  # The reported latest run used deterministic reference scoring only.
  judge_model:
    provider: ollama
    model_name: mistral:7b
    temperature: 0.0
    max_tokens: 16

prompt_templates:
  baseline: factual_direct
  round2:
    - factual_direct
    - strict_abstain
  full_study:
    - factual_direct
    - strict_abstain
    - chain_of_thought
    - concise_factual

evaluation:
  method: deterministic_reference_scoring
  repetitions_per_item: 1
  misconception:
    similarity_threshold: 0.72

ollama:
  base_url: http://localhost:11434/v1

phoenix:
  project_name: hallucination-reliability-study
  port: 6006

execution:
  full_study:
    output_name: experiment_results_latest_19608.csv
    max_workers: 8
    checkpoint_every: 500
